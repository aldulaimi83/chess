<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♟️ Free Chess</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            width: 480px;
            height: 480px;
            border: 12px solid #1f2937;
            margin: 20px auto;
        }
        .square {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            cursor: pointer;
        }
        .light { background: #f0d9b5; }
        .dark  { background: #b58863; }
        .selected { background: #22c55e !important; }
        .possible { box-shadow: inset 0 0 0 5px #eab308; }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <div class="max-w-md mx-auto pt-10">
        <h1 class="text-4xl font-bold text-center mb-8">♟️ Free Chess</h1>

        <div class="flex justify-center gap-4 mb-6">
            <button onclick="setMode('ai')" id="aiBtn" 
                    class="px-6 py-3 rounded-3xl bg-emerald-600">vs AI</button>
            <button onclick="setMode('2p')" id="2pBtn"
                    class="px-6 py-3 rounded-3xl bg-zinc-700">2 Players</button>
        </div>

        <div id="board" class="board"></div>

        <div class="text-center mt-6">
            <p id="status" class="text-xl font-medium">White's turn</p>
        </div>

        <div class="flex gap-4 justify-center mt-8">
            <button onclick="newGame()" class="px-8 py-3 bg-white text-black rounded-3xl">New Game</button>
            <button onclick="undoMove()" class="px-8 py-3 bg-zinc-800 rounded-3xl">Undo</button>
        </div>

        <div class="text-center text-xs text-zinc-500 mt-12">
            Click a piece to select • Click destination to move
        </div>
    </div>

    <script>
        let game = new Chess();
        let selectedSquare = null;
        let isAiMode = true;

        function renderBoard() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';

            for (let row = 8; row >= 1; row--) {
                for (let col = 0; col < 8; col++) {
                    const square = String.fromCharCode(97 + col) + row;
                    const squareDiv = document.createElement('div');
                    const isLight = (row + col) % 2 === 0;
                    
                    squareDiv.className = `square ${isLight ? 'light' : 'dark'}`;
                    squareDiv.dataset.square = square;

                    const piece = game.get(square);
                    if (piece) {
                        squareDiv.innerHTML = getPieceSymbol(piece);
                    }

                    squareDiv.addEventListener('click', () => handleSquareClick(square));
                    boardDiv.appendChild(squareDiv);
                }
            }
        }

        function getPieceSymbol(piece) {
            const pieces = {
                'k': '♚', 'q': '♛', 'r': '♜', 'b': '♝', 'n': '♞', 'p': '♟️',
                'K': '♔', 'Q': '♕', 'R': '♖', 'B': '♗', 'N': '♘', 'P': '♙'
            };
            return pieces[piece.type] || '';
        }

        function handleSquareClick(square) {
            if (selectedSquare) {
                const move = game.move({
                    from: selectedSquare,
                    to: square,
                    promotion: 'q'
                });

                if (move) {
                    renderBoard();
                    updateStatus();

                    if (isAiMode && game.turn() === 'b' && !game.game_over()) {
                        setTimeout(aiMakeMove, 300);
                    }
                }
                selectedSquare = null;
            } else {
                const piece = game.get(square);
                if (piece && ((game.turn() === 'w' && piece.color === 'w') || 
                             (game.turn() === 'b' && piece.color === 'b'))) {
                    selectedSquare = square;
                    renderBoard();
                }
            }
        }

        function aiMakeMove() {
            const moves = game.moves();
            if (moves.length === 0) return;

            const randomMove = moves[Math.floor(Math.random() * moves.length)];
            game.move(randomMove);
            renderBoard();
            updateStatus();
        }

        function updateStatus() {
            const statusEl = document.getElementById('status');
            if (game.isCheckmate()) {
                statusEl.textContent = `Checkmate! ${game.turn() === 'w' ? 'Black' : 'White'} wins!`;
            } else if (game.isDraw()) {
                statusEl.textContent = "It's a draw!";
            } else {
                statusEl.textContent = `${game.turn() === 'w' ? "White" : "Black"}'s turn`;
            }
        }

        function setMode(mode) {
            isAiMode = (mode === 'ai');
            document.getElementById('aiBtn').classList.toggle('bg-emerald-600', isAiMode);
            document.getElementById('2pBtn').classList.toggle('bg-emerald-600', !isAiMode);
            newGame();
        }

        function newGame() {
            game = new Chess();
            selectedSquare = null;
            renderBoard();
            updateStatus();
        }

        function undoMove() {
            if (game.history().length > 0) {
                game.undo();
                if (isAiMode && game.history().length > 0) game.undo();
                renderBoard();
                updateStatus();
            }
        }

        // Start the game
        window.onload = () => {
            newGame();
        };
    </script>
</body>
</html>
