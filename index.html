<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Youooo Chess</title>

  <link rel="stylesheet" href="style.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.css"
  />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>♟ Youooo Chess</h1>
        <p class="subtitle">Play vs AI, local friend, or online rooms</p>
      </div>
      <div class="badge">Online Ready</div>
    </header>

    <main class="layout">
      <section class="board-panel">
        <div class="board-wrap">
          <div id="board"></div>
        </div>
      </section>

      <aside class="side-panel">
        <div class="card">
          <h2>Game Modes</h2>
          <div class="controls">
            <button id="aiBtn">Play vs AI</button>
            <button id="localBtn">2 Players</button>
            <button id="createRoomBtn">Create Room</button>
            <button id="joinRoomBtn">Join Room</button>
            <button id="flipBtn" class="secondary">Flip Board</button>
            <button id="resetBtn" class="danger">Reset Game</button>
          </div>
        </div>

        <div class="card">
          <h2>Online Room</h2>
          <input id="roomInput" type="text" placeholder="Enter room code" />
          <div class="room-row">
            <span class="label">Current room:</span>
            <span id="roomCode">None</span>
          </div>
          <div class="room-row">
            <span class="label">Server:</span>
            <span id="serverState">Connecting...</span>
          </div>
        </div>

        <div class="card">
          <h2>Status</h2>
          <div id="status">Loading...</div>
        </div>

        <div class="card">
          <h2>Move History</h2>
          <ol id="moveHistory" class="history"></ol>
        </div>
      </aside>
    </main>
  </div>

  <!-- REQUIRED: jQuery must load before chessboard.js -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.js"></script>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
